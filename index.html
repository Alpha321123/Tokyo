<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>東京旅行規劃</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fb;
            margin: 0;
            color: #222;
        }
        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(21, 50, 102, 0.12);
            margin-bottom: 24px;
        }
        h1 {
            margin-bottom: 16px;
            font-size: 2.4rem;
        }
        p {
            line-height: 1.7;
            margin-bottom: 16px;
        }
        .button {
            display: inline-block;
            text-decoration: none;
            background: #1b6ec2;
            color: #fff;
            padding: 14px 26px;
            border-radius: 8px;
            font-weight: 600;
        }
        .button:hover {
            background: #1458a4;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">
            <h1>東京旅行規劃</h1>
            <p>這個倉庫包含一個東京旅遊規劃器，已經準備好每日行程、交通、景點與票券建議。這個首頁是靜態展示頁，避免無限載入。</p>
            <p>要運行完整的旅遊規劃器，請在 `Tokyo.Web` 目錄內使用 .NET 運行應用程式：</p>
            <pre>cd Tokyo.Web
dotnet run</pre>
            <p>然後打開瀏覽器並訪問：</p>
            <p><strong>https://localhost:5001</strong></p>
            <a class="button" href="Tokyo.Web">Open Tokyo.Web folder</a>
        </div>
        <div class="card">
            <h2>功能簡介</h2>
            <ul>
                <li>每日行程規劃</li>
                <li>交通與時間安排</li>
                <li>景點、美食與票券建議</li>
                <li>中英日三語地名展示</li>
            </ul>
        </div>
    </div>
</body>

</html>
